<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="moku-hyō">
<meta name="mobile-web-app-capable" content="yes">
<title>moku-hyō</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EE;--bg2:#EFEBE6;--ash:#D8D2CC;--mist:#C4D0C8;--blush:#D4C0C8;
  --text:#6A6460;--dim:#A09890;--faint:#C8C0BC;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',Georgia,sans-serif;font-weight:300;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 80px;overflow-x:hidden;
  padding-bottom:env(safe-area-inset-bottom,20px)}

.test-banner{width:100%;background:rgba(200,168,120,0.13);border-bottom:1px solid rgba(200,168,120,0.22);
  padding:8px 20px;text-align:center;font-size:0.65rem;letter-spacing:0.15em;color:#C8A878;text-transform:uppercase}
header{width:100%;padding:36px 24px 24px;text-align:center}
.wordmark{font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-size:2rem;letter-spacing:0.22em;color:var(--text);display:block}
.wordmark em{font-style:italic;color:var(--dim)}
.tagline{margin-top:6px;font-size:0.65rem;letter-spacing:0.2em;color:var(--faint);text-transform:uppercase}
main{width:100%;max-width:480px;padding:0 20px;display:flex;flex-direction:column;gap:14px}

/* cards */
.card{background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.9);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(180,165,150,0.07)}
.card-inner{padding:18px 18px 14px;display:flex;gap:14px;align-items:flex-start;cursor:pointer}

/* thumb — blurred full image */
.puzzle-thumb{width:68px;height:68px;border-radius:10px;flex-shrink:0;overflow:hidden;position:relative;background:#e8e4e0}
.puzzle-thumb img{width:100%;height:100%;object-fit:cover;filter:blur(20px) saturate(0.75);transform:scale(1.2)}

.challenge-meta{flex:1;min-width:0}
.challenge-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.05rem;font-weight:400;letter-spacing:0.04em;
  color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.challenge-days{font-size:0.68rem;letter-spacing:0.1em;color:var(--dim);margin-bottom:9px}
.progress-track{height:2px;background:var(--ash);border-radius:2px;overflow:hidden;margin-bottom:5px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--mist),var(--blush));border-radius:2px;transition:width 0.8s cubic-bezier(0.25,1,0.5,1)}
.progress-label{font-size:0.6rem;letter-spacing:0.08em;color:var(--faint)}

.checkin-strip{border-top:1px solid rgba(200,190,185,0.28);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.checkin-btn{background:none;border:1px solid rgba(180,165,155,0.45);border-radius:20px;padding:6px 16px;
  font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:300;letter-spacing:0.1em;color:var(--text);cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.checkin-btn:active{background:var(--bg2)}
.streak-badge{font-size:0.63rem;letter-spacing:0.08em;color:var(--dim);white-space:nowrap}

.complete-banner{background:linear-gradient(135deg,rgba(196,208,200,0.3),rgba(212,192,200,0.3));
  border-top:1px solid rgba(200,190,185,0.22);padding:9px 18px;font-size:0.67rem;letter-spacing:0.14em;
  color:var(--dim);text-align:center;cursor:pointer}

.add-card{border:1px dashed rgba(180,168,160,0.38);background:rgba(245,242,238,0.3);border-radius:14px;
  padding:18px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.add-card-label{font-size:0.68rem;letter-spacing:0.18em;color:var(--faint);text-transform:uppercase}
.section-hd{font-size:0.62rem;letter-spacing:0.2em;color:var(--faint);text-transform:uppercase;padding:4px 2px}

.archive-item{background:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.85);border-radius:14px;
  display:flex;gap:14px;align-items:center;padding:14px 16px;cursor:pointer}
.archive-thumb{width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#e8e4e0}
.archive-thumb img{width:100%;height:100%;object-fit:cover;filter:blur(16px) saturate(0.75);transform:scale(1.15)}
.archive-meta{flex:1;min-width:0}
.archive-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:1rem;font-weight:400;color:var(--text);margin-bottom:2px}
.archive-info{font-size:0.63rem;letter-spacing:0.08em;color:var(--dim)}

/* modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(230,224,218,0.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:100;
  align-items:flex-end;justify-content:center;padding:0 16px 24px;
  padding-bottom:max(24px, env(safe-area-inset-bottom))}
.modal-overlay.open{display:flex}
.modal{background:rgba(255,255,255,0.92);border:1px solid rgba(255,255,255,0.95);border-radius:20px;
  width:100%;max-width:440px;padding:26px 22px 22px;display:flex;flex-direction:column;gap:18px;
  animation:slideUp 0.35s cubic-bezier(0.25,1,0.5,1);max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.25rem;font-weight:300;letter-spacing:0.1em;color:var(--text)}
.field-label{font-size:0.63rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
.text-input{width:100%;background:var(--bg);border:1px solid rgba(200,190,185,0.55);border-radius:8px;
  padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:0.86rem;font-weight:300;color:var(--text);outline:none}
.text-input::placeholder{color:var(--faint)}
.day-pills{display:flex;gap:7px}
.day-pill{flex:1;padding:8px 0;background:var(--bg);border:1px solid rgba(200,190,185,0.45);
  border-radius:20px;font-size:0.76rem;color:var(--dim);cursor:pointer;text-align:center;transition:all 0.2s}
.day-pill.active{background:var(--bg2);border-color:rgba(140,128,120,0.55);color:var(--text)}

/* image picker — blurred preview */
.img-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.img-opt{aspect-ratio:1;border-radius:9px;border:2px solid transparent;cursor:pointer;overflow:hidden;transition:all 0.2s;position:relative;background:#e8e4e0}
.img-opt img{width:100%;height:100%;object-fit:cover;filter:blur(18px) saturate(0.75);transform:scale(1.18);display:block}
.img-opt.active{border-color:rgba(140,130,120,0.75);box-shadow:0 0 0 3px rgba(200,190,185,0.3)}
.img-opt-lbl{position:absolute;bottom:0;left:0;right:0;padding:3px 2px;
  background:rgba(240,236,232,0.88);font-size:0.45rem;text-align:center;letter-spacing:0.03em;color:var(--dim);line-height:1.3}

.modal-actions{display:flex;gap:9px}
.btn-ghost{flex:1;padding:11px;background:none;border:1px solid rgba(200,190,185,0.45);border-radius:9px;
  font-size:0.76rem;color:var(--dim);cursor:pointer}
.btn-primary{flex:2;padding:11px;background:linear-gradient(135deg,rgba(196,208,200,0.65),rgba(212,192,200,0.65));
  border:1px solid rgba(180,168,160,0.35);border-radius:9px;font-size:0.76rem;font-weight:400;letter-spacing:0.12em;color:var(--text);cursor:pointer}

/* reveal modal */
.reveal-modal{display:none;position:fixed;inset:0;background:rgba(230,224,218,0.94);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:200;
  flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px 24px;overflow-y:auto}
.reveal-modal.open{display:flex;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.reveal-img-wrap{width:min(300px,85vw);aspect-ratio:1;border-radius:18px;overflow:hidden;
  box-shadow:0 20px 60px rgba(150,130,110,0.22)}
.reveal-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.reveal-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.4rem;font-weight:300;letter-spacing:0.1em;color:var(--text);text-align:center}
.reveal-sub{font-size:0.65rem;letter-spacing:0.18em;color:var(--dim);text-align:center;text-transform:uppercase}
.reveal-close{padding:10px 28px;background:rgba(255,255,255,0.7);border:1px solid rgba(200,190,185,0.5);border-radius:20px;
  font-size:0.74rem;letter-spacing:0.12em;color:var(--text);cursor:pointer}

/* puzzle view */
.puzzle-view{display:none;position:fixed;inset:0;background:var(--bg);z-index:150;
  flex-direction:column;align-items:center;
  padding:max(26px,env(safe-area-inset-top)) 22px max(50px,env(safe-area-inset-bottom));
  overflow-y:auto}
.puzzle-view.open{display:flex}
.pv-back{align-self:flex-start;background:none;border:none;font-size:0.67rem;letter-spacing:0.15em;
  color:var(--dim);cursor:pointer;padding:0;margin-bottom:22px;text-transform:uppercase;-webkit-tap-highlight-color:transparent}
.pv-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.45rem;font-weight:300;letter-spacing:0.1em;color:var(--text);margin-bottom:3px;text-align:center}
.pv-subtitle{font-size:0.62rem;letter-spacing:0.15em;color:var(--faint);margin-bottom:24px;text-align:center;text-transform:uppercase}

/* THE PUZZLE GRID */
.puzzle-wrap{width:100%;max-width:340px;aspect-ratio:1;border-radius:18px;overflow:hidden;
  box-shadow:0 10px 36px rgba(150,130,110,0.14);margin-bottom:18px;
  position:relative;background:#e8e4e0;flex-shrink:0}
/* full image underneath */
.puzzle-full-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
/* grid overlay */
.puzzle-overlay{position:absolute;inset:0;display:grid}
.puzzle-tile{/* individual tile */}
.puzzle-tile.hidden{background:rgba(230,226,222,0.96)}
.puzzle-tile.revealed{background:transparent}

.pv-progress{width:100%;max-width:340px;height:2px;background:var(--ash);border-radius:2px;overflow:hidden;margin-bottom:7px}
.pv-progress-fill{height:100%;background:linear-gradient(90deg,var(--mist),var(--blush));border-radius:2px;transition:width 0.8s cubic-bezier(0.25,1,0.5,1)}
.pv-stat{font-size:0.63rem;letter-spacing:0.12em;color:var(--faint);text-align:center;margin-bottom:24px;text-transform:uppercase}
.pv-checkin-btn{padding:12px 36px;background:rgba(255,255,255,0.7);border:1px solid rgba(180,168,160,0.4);border-radius:24px;
  font-size:0.76rem;letter-spacing:0.14em;color:var(--text);cursor:pointer;-webkit-tap-highlight-color:transparent}
.pv-checkin-btn:active:not(:disabled){background:rgba(255,255,255,0.95)}
.pv-checkin-btn:disabled{color:var(--faint);border-color:rgba(200,195,190,0.28);cursor:default}

.empty-hint{text-align:center;padding:44px 20px 20px}
.empty-icon{font-size:1.8rem;margin-bottom:10px;opacity:0.3}
.empty-text{font-family:'Cormorant Garamond',Georgia,serif;font-size:1rem;font-style:italic;color:var(--dim);letter-spacing:0.05em;line-height:1.7}
</style>

// ══════════════════════════════════════
// Seeded shuffle
// ══════════════════════════════════════
function seededShuffle(arr, seed) {
  var s = seed % 2147483647; if(s<=0) s+=2147483646;
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){s=(s*16807)%2147483647;var j=s%(i+1);var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function getTileOrder(total, seed) {
  var a=[]; for(var i=0;i<total;i++) a.push(i);
  return seededShuffle(a, seed);
}

// ══════════════════════════════════════
// Build puzzle DOM
// ══════════════════════════════════════
function buildPuzzle(wrap, imgSrc, revealedCount, total, seed) {
  wrap.innerHTML = '';
  // full image underneath
  var img = document.createElement('img');
  img.src = imgSrc;
  img.className = 'puzzle-full-img';
  img.alt = '';
  wrap.appendChild(img);

  var cols = Math.ceil(Math.sqrt(total));
  var rows = Math.ceil(total / cols);
  var order = getTileOrder(total, seed);
  var revealed = {};
  for(var k=0;k<revealedCount;k++) revealed[order[k]]=true;

  var grid = document.createElement('div');
  grid.className = 'puzzle-overlay';
  grid.style.gridTemplateColumns = 'repeat('+cols+',1fr)';
  grid.style.gridTemplateRows = 'repeat('+rows+',1fr)';
  for(var i=0;i<total;i++){
    var tile = document.createElement('div');
    tile.className = 'puzzle-tile ' + (revealed[i] ? 'revealed' : 'hidden');
    grid.appendChild(tile);
  }
  wrap.appendChild(grid);
}

var data = loadData();

function render(){
  var main = document.getElementById('main'); main.innerHTML='';

  if(data.active.length===0 && data.done.length===0){
    var eh=document.createElement('div');eh.className='empty-hint';
    eh.innerHTML='<div class="empty-icon">◇</div><p class="empty-text">新增你的第一個挑戰<br>每一天，解鎖一片謎</p>';
    main.appendChild(eh);
  }

  data.active.forEach(function(ch){
    var pct = Math.min(ch.checkIns.length/ch.totalDays*100,100);
    var done = ch.checkIns.length>=ch.totalDays;
    var img = IMG_DATA[ch.imageIdx];

    var card = document.createElement('div'); card.className='card';
    var inner = document.createElement('div'); inner.className='card-inner';

    // blurred thumb
    var thumbWrap = document.createElement('div'); thumbWrap.className='puzzle-thumb';
    var thumbImg = document.createElement('img');
    thumbImg.src = img.src; thumbImg.alt='';
    thumbWrap.appendChild(thumbImg);

    var meta = document.createElement('div'); meta.className='challenge-meta';
    var left = Math.max(0,ch.totalDays-ch.checkIns.length);
    meta.innerHTML = '<div class="challenge-name">'+ch.name+'</div>'+
      '<div class="challenge-days">'+ch.checkIns.length+' / '+ch.totalDays+' 天 · 剩 '+left+' 天</div>'+
      '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="progress-label">'+(done?'已完成 ✦':Math.round(pct)+'% 完成')+'</div>';

    inner.appendChild(thumbWrap); inner.appendChild(meta);
    (function(id){inner.addEventListener('click',function(){openPV(id);});})(ch.id);
    card.appendChild(inner);

    if(done){
      var banner=document.createElement('div'); banner.className='complete-banner';
      banner.textContent='點擊查看完整圖案 ◇';
      (function(id){banner.addEventListener('click',function(){openReveal(id,false);});})(ch.id);
      card.appendChild(banner);
    } else {
      var strip=document.createElement('div'); strip.className='checkin-strip';
      var btn=document.createElement('button'); btn.className='checkin-btn'; btn.textContent='打卡';
      (function(id){btn.addEventListener('click',function(e){e.stopPropagation();checkIn(id);});})(ch.id);
      var streak=document.createElement('div'); streak.className='streak-badge';
      streak.textContent=ch.checkIns.length>0?ch.checkIns.length+' 天連續':'';
      strip.appendChild(btn); strip.appendChild(streak); card.appendChild(strip);
    }
    main.appendChild(card);
  });

  if(data.active.length<3){
    var addCard=document.createElement('div'); addCard.className='add-card';
    addCard.innerHTML='<div class="add-card-label">+ 新增挑戰</div>';
    addCard.addEventListener('click',openSetup); main.appendChild(addCard);
  }

  if(data.done.length>0){
    var hd=document.createElement('div'); hd.className='section-hd'; hd.textContent='已完成的挑戰'; main.appendChild(hd);
    data.done.slice().reverse().forEach(function(ch){
      var item=document.createElement('div'); item.className='archive-item';
      var tw=document.createElement('div'); tw.className='archive-thumb';
      var timg=document.createElement('img'); timg.src=IMG_DATA[ch.imageIdx].src; timg.alt='';
      tw.appendChild(timg);
      var ameta=document.createElement('div'); ameta.className='archive-meta';
      ameta.innerHTML='<div class="archive-name">'+ch.name+'</div>'+
        '<div class="archive-info">'+ch.totalDays+' 天完成 · '+(ch.completedAt||'')+'</div>';
      item.appendChild(tw); item.appendChild(ameta);
      (function(id){item.addEventListener('click',function(){openReveal(id,true);});})(ch.id);
      main.appendChild(item);
    });
  }
}

// ══════════════════════════════════════
// Check-in (test: no daily limit)
// ══════════════════════════════════════
function checkIn(id){
  var ch=null;
  for(var i=0;i<data.active.length;i++){if(data.active[i].id===id){ch=data.active[i];break;}}
  if(!ch)return;
  ch.checkIns.push(new Date().toDateString());
  saveData(); render();
  if(ch.checkIns.length>=ch.totalDays) setTimeout(function(){openReveal(id,false);},350);
}

// ══════════════════════════════════════
// Puzzle view
// ══════════════════════════════════════
function findCh(id){
  var all=data.active.concat(data.done);
  for(var i=0;i<all.length;i++){if(all[i].id===id)return all[i];}
  return null;
}

function openPV(id){
  var ch=findCh(id); if(!ch)return; pvId=id;
  var done=ch.checkIns.length>=ch.totalDays;
  var pct=Math.min(ch.checkIns.length/ch.totalDays*100,100);
  document.getElementById('pvTitle').textContent=ch.name;
  document.getElementById('pvSub').textContent=ch.checkIns.length+' / '+ch.totalDays+' 天';
  document.getElementById('pvProgressFill').style.width=pct+'%';
  document.getElementById('pvStat').textContent=done?'已完成 ✦':'剩 '+(ch.totalDays-ch.checkIns.length)+' 天';
  var btn=document.getElementById('pvCheckinBtn');
  if(done){
    btn.textContent='查看完整圖案 ◇'; btn.disabled=false;
    btn.onclick=function(){openReveal(id,false);};
  } else {
    btn.textContent='打卡，解鎖下一片'; btn.disabled=false;
    btn.onclick=function(){checkIn(id);openPV(id);};
  }
  buildPuzzle(
    document.getElementById('puzzleWrap'),
    IMG_DATA[ch.imageIdx].src,
    ch.checkIns.length, ch.totalDays, ch.seed
  );
  document.getElementById('puzzleView').classList.add('open');
}

document.getElementById('pvBack').addEventListener('click',function(){
  document.getElementById('puzzleView').classList.remove('open');
  pvId=null; render();
});

// ══════════════════════════════════════
// Reveal
// ══════════════════════════════════════
function openReveal(id, fromArchive){
  var ch=findCh(id); if(!ch)return;
  if(!fromArchive){
    for(var i=0;i<data.active.length;i++){
      if(data.active[i].id===id){
        var moved=data.active.splice(i,1)[0];
        moved.completedAt=new Date().toLocaleDateString('zh-Hant',{month:'long',day:'numeric'});
        data.done.push(moved); saveData(); render(); ch=moved; break;
      }
    }
  }
  document.getElementById('revealName').textContent=ch.name;
  document.getElementById('revealImg').src=IMG_DATA[ch.imageIdx].src;
  document.getElementById('puzzleView').classList.remove('open');
  document.getElementById('revealModal').classList.add('open');
}

document.getElementById('revealClose').addEventListener('click',function(){
  document.getElementById('revealModal').classList.remove('open');
});

// ══════════════════════════════════════
// Setup modal
// ══════════════════════════════════════
function openSetup(){
  document.getElementById('challengeName').value='';
  setupDays=7; setupImg=0;
  document.querySelectorAll('.day-pill').forEach(function(p){p.classList.toggle('active',p.dataset.d==='7');});
  document.querySelectorAll('.img-opt').forEach(function(o,i){o.classList.toggle('active',i===0);});
  document.getElementById('setupModal').classList.add('open');
}
function closeSetup(){document.getElementById('setupModal').classList.remove('open');}

document.querySelectorAll('.day-pill').forEach(function(p){
  p.addEventListener('click',function(){
    document.querySelectorAll('.day-pill').forEach(function(x){x.classList.remove('active');});
    p.classList.add('active'); setupDays=parseInt(p.dataset.d);
  });
});

// image picker
var imgGrid=document.getElementById('imgGrid');
IMG_DATA.forEach(function(img,i){
  var opt=document.createElement('div'); opt.className='img-opt'+(i===0?' active':'');
  var im=document.createElement('img'); im.src=img.src; im.alt='';
  opt.appendChild(im);
  var lbl=document.createElement('div'); lbl.className='img-opt-lbl'; lbl.textContent=img.label;
  opt.appendChild(lbl);
  (function(idx){opt.addEventListener('click',function(){
    document.querySelectorAll('.img-opt').forEach(function(x){x.classList.remove('active');});
    opt.classList.add('active'); setupImg=idx;
  });})(i);
  imgGrid.appendChild(opt);
});

document.getElementById('cancelBtn').addEventListener('click',closeSetup);
document.getElementById('setupModal').addEventListener('click',function(e){if(e.target===e.currentTarget)closeSetup();});
document.getElementById('confirmBtn').addEventListener('click',function(){
  var name=document.getElementById('challengeName').value.trim();
  if(!name){document.getElementById('challengeName').focus();return;}
  var seed=Date.now();
  data.active.push({id:seed.toString(),name:name,totalDays:setupDays,imageIdx:setupImg,checkIns:[],seed:seed});
  saveData(); closeSetup(); render();
});

render();
</script>
</body>
</html>
