<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="moku-hyō">
<title>moku-hyō</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F4;--card:#FFFFFF;--card2:#F2F0ED;
  --text:#242529;--text2:#6B6B6B;--text3:#ABABAB;
  --accent:#A89FE8;--accent-light:#EEEDFB;
  --green:#2D7D46;--green-light:#E8F5ED;
  --red:#C0392B;--red-light:#FDE8E6;
  --gold:#C8A878;
  --border:rgba(0,0,0,0.07);
  --shadow:0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
  --r:16px;--r-sm:10px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding-bottom:max(80px,env(safe-area-inset-bottom,80px));overflow-x:hidden}

/* ── TOP BAR ── */
.topbar{width:100%;max-width:480px;padding:max(52px,env(safe-area-inset-top,52px)) 20px 16px;
  display:flex;align-items:center;justify-content:center;position:relative}
.wordmark{font-size:1.25rem;font-weight:700;letter-spacing:-0.02em;color:var(--text);text-align:center}
.wordmark span{color:#C5BFFF}
.topbar-actions{display:flex;gap:8px;position:absolute;right:20px}
.icon-btn{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);
  font-size:1.1rem;-webkit-tap-highlight-color:transparent;transition:transform 0.15s}
.icon-btn:active{transform:scale(0.94)}

/* ── PHASE BADGE ── */
.phase-banner{width:100%;max-width:480px;padding:0 20px 4px}
.phase-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(232,200,112,0.18);
  color:#8A6820;border-radius:20px;padding:5px 12px;font-size:0.72rem;font-weight:600;letter-spacing:0.02em}
.phase-pill.locked{background:#F2F0ED;color:var(--text3)}

/* ── MAIN ── */
main{width:100%;max-width:480px;padding:0 20px;display:flex;flex-direction:column;gap:10px}

/* ── SECTION HEADER ── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 0 8px}
.sec-title{font-size:0.78rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2)}
.sec-count{font-size:0.72rem;color:var(--text3)}

/* ── CHALLENGE CARD ── */
.ch-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);
  box-shadow:var(--shadow);overflow:hidden;transition:transform 0.15s,box-shadow 0.15s}
.ch-card:active{transform:scale(0.985)}
.ch-inner{padding:16px;display:flex;gap:14px;align-items:center;cursor:pointer}

.ch-thumb{width:60px;height:60px;border-radius:var(--r-sm);flex-shrink:0;overflow:hidden;
  position:relative;background:#E8E4E0}
.ch-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.lock-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.18);font-size:1.2rem}

.ch-body{flex:1;min-width:0}
.ch-name{font-size:0.95rem;font-weight:600;color:var(--text);margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-sub{font-size:0.72rem;color:var(--text3);margin-bottom:8px}
.prog-bar{height:3px;background:#EBEBEB;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#C5BFFF;border-radius:3px;transition:width 0.6s cubic-bezier(0.25,1,0.5,1)}
.prog-fill.green{background:var(--green)}
.prog-fill.red{background:#DEDEDE}

.ch-action{border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.checkin-btn{background:#E8E5FF;color:#4B40B8;border:none;border-radius:20px;padding:7px 18px;
  font-size:0.75rem;font-weight:600;letter-spacing:0.02em;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s}
.checkin-btn:active{transform:scale(0.95);opacity:0.9}
.checkin-btn.done{background:#E8F5ED;color:#2D7D46}
.checkin-btn.failed{background:var(--red-light);color:var(--red);cursor:default}
.streak-txt{font-size:0.7rem;color:var(--text3)}

/* completed card variant */
.ch-card.completed .ch-inner{cursor:pointer}
.ch-card.failed-card .ch-name{color:var(--text3)}

/* ── ADD CARD ── */
.add-card{background:var(--card);border:1.5px dashed rgba(160,152,220,0.35);border-radius:var(--r);
  padding:18px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;transition:all 0.2s}
.add-card:active{background:#EEEDFB}
.add-card-label{font-size:0.8rem;font-weight:500;color:#242529;letter-spacing:0.04em}

/* ── COMPLETED GRID ── */
.completed-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cg-item{aspect-ratio:1;border-radius:var(--r-sm);overflow:hidden;position:relative;
  cursor:pointer;background:#E8E4E0;-webkit-tap-highlight-color:transparent}
.cg-item img{width:100%;height:100%;object-fit:cover;display:block}
.cg-item.locked img{filter:blur(18px) saturate(0.75);transform:scale(1.18)}
.cg-item .lock-icon{font-size:1rem}
.cg-label{position:absolute;bottom:0;left:0;right:0;padding:4px 3px;
  background:rgba(0,0,0,0.32);font-size:0.42rem;color:#fff;text-align:center;letter-spacing:0.03em}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px}
.empty-icon{font-size:2rem;margin-bottom:10px;opacity:0.3}
.empty-txt{font-size:0.88rem;color:var(--text3);line-height:1.6}

/* ── MODALS BASE ── */
.overlay{display:none;position:fixed;inset:0;z-index:100}
.overlay.open{display:flex}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}

/* ── SETUP SHEET ── */
.setup-sheet{position:relative;background:var(--card);border-radius:24px 24px 0 0;
  width:100%;max-width:480px;margin:auto auto 0;padding:24px 20px max(24px,env(safe-area-inset-bottom,24px));
  display:flex;flex-direction:column;gap:20px;max-height:90vh;overflow-y:auto;
  animation:slideUp 0.35s cubic-bezier(0.25,1,0.5,1)}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:0 auto -8px}
.sheet-title{font-size:1.1rem;font-weight:700;color:var(--text)}

.field-lbl{font-size:0.72rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.text-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);
  padding:12px 14px;font-size:0.95rem;color:var(--text);outline:none;transition:border-color 0.2s}
.text-input:focus{border-color:#242529}
.text-input::placeholder{color:var(--text3)}

/* phase tabs */
.phase-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:3px}
.phase-tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:0.8rem;font-weight:500;
  color:var(--text2);cursor:pointer;transition:all 0.2s}
.phase-tab.active{background:var(--card);color:#242529;font-weight:600;box-shadow:0 1px 6px rgba(0,0,0,0.08)}
.phase-tab.locked-tab{color:var(--text3);cursor:default}

/* image picker */
.img-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ip-item{aspect-ratio:1;border-radius:var(--r-sm);overflow:hidden;position:relative;cursor:pointer;
  background:#E8E4E0;border:2.5px solid transparent;transition:all 0.2s}
.ip-item img{width:100%;height:100%;object-fit:cover;filter:blur(14px) saturate(0.8);transform:scale(1.15);display:block}
.ip-item.active{border-color:#242529;box-shadow:0 0 0 3px rgba(91,79,232,0.2)}
.ip-item.used img{filter:blur(14px) saturate(0.5) brightness(0.7)}
.ip-item.used::after{content:'進行中';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:0.5rem;font-weight:600;color:#fff;background:rgba(0,0,0,0.3)}
.ip-item.locked-img::after{content:'🔒';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;background:rgba(0,0,0,0.35)}
.ip-item.locked-img img{filter:blur(18px) saturate(0.4) brightness(0.6);transform:scale(1.18)}
.ip-lbl{position:absolute;bottom:0;left:0;right:0;padding:3px 2px;
  background:rgba(0,0,0,0.35);font-size:0.44rem;text-align:center;color:#fff;letter-spacing:0.03em}

.day-pills{display:flex;gap:8px}
.day-pill{flex:1;padding:10px 0;background:var(--bg);border:1.5px solid var(--border);
  border-radius:20px;font-size:0.82rem;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:all 0.2s}
.day-pill.active{background:#D6D1FB;border-color:#B8B2F0;color:#fff}

.sheet-actions{display:flex;gap:10px}
.btn-ghost{flex:1;padding:13px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;
  font-size:0.85rem;font-weight:500;color:var(--text2);cursor:pointer}
.btn-primary{flex:2;padding:13px;background:#E8E5FF;border:none;border-radius:12px;
  font-size:0.85rem;font-weight:600;color:#4B40B8;cursor:pointer;transition:opacity 0.2s}
.btn-primary:disabled{opacity:0.4;cursor:default}

/* ── PUZZLE VIEW ── */
.pv-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:150;
  flex-direction:column;align-items:center;
  padding:max(52px,env(safe-area-inset-top,52px)) 20px max(40px,env(safe-area-inset-bottom,40px));
  overflow-y:auto}
.pv-overlay.open{display:flex;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.pv-topbar{width:100%;max-width:400px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.pv-back{background:none;border:none;font-size:0.8rem;font-weight:500;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;gap:4px;padding:0}
.pv-name{font-size:1rem;font-weight:700;color:var(--text)}
.pv-days-badge{font-size:0.72rem;font-weight:500;color:#242529;background:#EEEDFB;
  padding:3px 10px;border-radius:10px}

.pz-wrap{width:100%;max-width:360px;aspect-ratio:1;border-radius:20px;overflow:hidden;
  box-shadow:var(--shadow-lg);position:relative;background:#E8E4E0;margin-bottom:20px;flex-shrink:0}
.pz-full-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.pz-grid{position:absolute;inset:0;display:grid}
.pz-tile.hidden{background:rgba(228,224,220,0.96)}
.pz-tile.revealed{background:transparent}

.pv-prog-wrap{width:100%;max-width:360px;margin-bottom:6px}
.pv-prog-bar{height:3px;background:#EBEBEB;border-radius:3px;overflow:hidden}
.pv-prog-fill{height:100%;background:#C5BFFF;border-radius:3px;transition:width 0.6s cubic-bezier(0.25,1,0.5,1)}
.pv-prog-label{display:flex;justify-content:space-between;margin-top:6px;margin-bottom:24px}
.pv-prog-label span{font-size:0.72rem;color:var(--text3)}

.pv-checkin-btn{padding:14px 48px;background:#E8E5FF;color:#4B40B8;border:none;border-radius:24px;
  font-size:0.88rem;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.2s}
.pv-checkin-btn:active:not(:disabled){transform:scale(0.96)}
.pv-checkin-btn:disabled{background:#EBEBEB;color:var(--text3);cursor:default}
.pv-checkin-btn.done-today{background:var(--green-light);color:var(--green)}
.pv-checkin-btn.view-story{background:var(--gold);color:#fff}

/* ── STORY VIEW ── */
.story-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;
  flex-direction:column;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.story-card{width:calc(100% - 48px);max-width:400px;background:var(--card);border-radius:20px;
  overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.28);display:flex;flex-direction:column;
  max-height:86vh}
.story-top{position:relative;width:100%;height:43vh;max-height:320px;flex-shrink:0;overflow:hidden;border-radius:20px 20px 0 0}
.story-top .story-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:opacity 0.8s ease,transform 0.8s ease;opacity:0;transform:scale(1.04)}
.story-top .story-img.active{opacity:1;transform:scale(1)}
.story-top-veil{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.0) 40%,rgba(0,0,0,0.3) 100%)}
.story-close-btn{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.35);border:none;color:#fff;font-size:1rem;display:flex;align-items:center;
  justify-content:center;cursor:pointer;z-index:2;backdrop-filter:blur(4px);line-height:1}
.story-overlay.open{display:flex}
.story-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:opacity 0.8s ease,transform 0.8s ease;opacity:0;transform:scale(1.04)}
.story-img.active{opacity:0.65;transform:scale(1)}
.story-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,20,0.92) 0%,rgba(13,13,20,0.3) 60%,rgba(13,13,20,0.5) 100%)}
.story-bottom{width:100%;background:var(--card);height:43vh;max-height:320px;overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;padding:16px 22px 22px;border-radius:0 0 20px 20px}
.story-phase-lbl{font-size:0.62rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text3);margin-bottom:10px;text-align:center}
.story-segments{display:flex;flex-direction:column;gap:0;width:100%}
.story-seg{opacity:0;transform:translateY(8px);transition:opacity 0.7s ease,transform 0.7s ease;
  font-size:13px;line-height:1.75;color:var(--text);text-align:center;padding:3px 0}
.story-seg.visible{opacity:1;transform:translateY(0)}
.story-seg .blank{display:inline-block;border-bottom:1.5px solid rgba(255,255,255,0.35);
  min-width:60px;color:transparent}
.story-seg .filled{color:#6B5FD0;font-weight:600}
.story-save-btn{margin-top:48px;padding:14px 40px;background:rgba(252,236,192,0.15);
  border:1.5px solid rgba(252,236,192,0.4);border-radius:24px;color:#FCECC0;font-size:0.88rem;
  font-weight:500;cursor:pointer;opacity:0;transition:opacity 0.6s ease;backdrop-filter:blur(8px)}
.story-save-btn.visible{opacity:1}

/* ── STORY BOOK ── */
.book-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:180;
  flex-direction:column;align-items:center;
  padding:max(52px,env(safe-area-inset-top,52px)) 20px max(40px,env(safe-area-inset-bottom,40px));
  overflow-y:auto}
.book-overlay.open{display:flex;animation:fadeIn 0.25s ease}
.book-topbar{width:100%;max-width:440px;display:flex;align-items:center;gap:12px;margin-bottom:28px}
.book-title{font-size:1.1rem;font-weight:700;color:var(--text)}

.book-story{width:100%;max-width:440px;background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.book-story-hd{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.book-story-title{font-size:0.95rem;font-weight:600;color:var(--text)}
.book-replay-btn{font-size:0.72rem;font-weight:500;color:#242529;background:#EEEDFB;
  border:none;border-radius:10px;padding:5px 12px;cursor:pointer}
.book-imgs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:14px}
.book-img-item{aspect-ratio:1;border-radius:8px;overflow:hidden;background:#E8E4E0;position:relative}
.book-img-item img{width:100%;height:100%;object-fit:cover}
.book-img-item.locked img{filter:blur(12px) saturate(0.6) brightness(0.7)}
.book-img-item .lock-icon{font-size:0.9rem}
.book-img-lbl{position:absolute;bottom:0;left:0;right:0;padding:3px;
  background:rgba(0,0,0,0.3);font-size:0.42rem;color:#fff;text-align:center}
.book-empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:0.88rem;line-height:1.6}

/* ── REVEAL FLASH ── */
.reveal-overlay{display:none;position:fixed;inset:0;z-index:300;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:rgba(13,13,20,0.88);backdrop-filter:blur(16px)}
.reveal-overlay.open{display:flex;animation:fadeIn 0.3s ease}
.reveal-puzzle-wrap{width:min(280px,82vw);aspect-ratio:1;border-radius:20px;overflow:hidden;
  box-shadow:var(--shadow-lg);position:relative;background:#E8E4E0}
.reveal-puzzle-wrap .pz-full-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.reveal-puzzle-wrap .pz-grid{position:absolute;inset:0;display:grid}
.reveal-puzzle-wrap .pz-tile.hidden{background:rgba(228,224,220,0.96)}
.reveal-puzzle-wrap .pz-tile.revealed{background:transparent}
.reveal-label{font-size:1rem;font-weight:600;color:#fff}
.reveal-sub{font-size:0.72rem;color:rgba(255,255,255,0.55);letter-spacing:0.1em}
.reveal-close{padding:11px 32px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);

<main id="main"></main>

<!-- ── SETUP SHEET ── -->
<div class="overlay" id="setupOverlay">
  <div class="overlay-bg" id="setupBg"></div>

    <div class="sheet-handle"></div>
    <div class="sheet-title">新增挑戰</div>
    <div>
      <div class="field-lbl">挑戰名稱</div>
      <input class="text-input" id="challengeName" placeholder="例：戒手搖飲料" maxlength="20">
    </div>
    <div>
      <div class="field-lbl">選擇階段</div>

      </div>
    </div>
    <div>
      <div class="field-lbl">神秘圖案</div>
      <div class="img-picker" id="imgPicker"></div>
    </div>
    <div id="dayPickerWrap" style="display:none">

        <div class="day-pill" data-d="16">16 天</div>

  </div>
</div>

    <div class="pv-name" id="pvName"></div>
    <div class="pv-days-badge" id="pvDaysBadge"></div>
  </div>
  <div class="pz-wrap" id="pzWrap"></div>
  <div class="pv-prog-wrap">
    <div class="pv-prog-bar"><div class="pv-prog-fill" id="pvProgFill"></div></div>
    <div class="pv-prog-label">
      <span id="pvProgLeft"></span>
      <span id="pvProgPct"></span>
    </div>
  </div>

function seededShuffle(arr, seed) {
  var s=seed%2147483647; if(s<=0)s+=2147483646;
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){s=(s*16807)%2147483647;var j=s%(i+1);var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function getTileOrder(total,seed){var a=[];for(var i=0;i<total;i++)a.push(i);return seededShuffle(a,seed);}
function today(){return new Date().toDateString();}
function daysBetween(d1,d2){return Math.round((new Date(d2)-new Date(d1))/(1000*60*60*24));}

// STATE

var KEY='mokuHyo_v5';
function loadData(){
  try{return JSON.parse(localStorage.getItem(KEY))||initData();}
  catch(e){return initData();}
}
function initData(){
  return {
    challenges:[],        // active/done/failed challenge objects
    p1Outcomes:{},        // imgIdx -> 'done'|'failed' for p1
    p2Outcomes:{},        // imgIdx -> 'done'|'failed' for p2
    p1StoryCollected:false,
    p2StoryCollected:false,
    p1StoryUnlocked:false,
    p2StoryUnlocked:false,
  };
}
function saveData(){localStorage.setItem(KEY,JSON.stringify(data));}
var data=loadData();

// check for daily failures on load
checkDailyFailures();

function checkDailyFailures(){
  if(!data.challenges)return;
  var changed=false;
  data.challenges.forEach(function(ch){
    if(ch.status!=='active')return;
    if(!ch.lastCheckIn)return; // never checked in — no failure yet on first day
    var lastDate=new Date(ch.lastCheckIn);
    var todayDate=new Date();
    todayDate.setHours(0,0,0,0); lastDate.setHours(0,0,0,0);
    var diff=Math.round((todayDate-lastDate)/(1000*60*60*24));
    if(diff>1){
      // missed a day — fail
      ch.status='failed';
      ch.failedAt=today();
      var outcomes=ch.phase===1?data.p1Outcomes:data.p2Outcomes;
      if(!outcomes[ch.imageIdx]||outcomes[ch.imageIdx]==='done')
        outcomes[ch.imageIdx]='failed';
      changed=true;
    }
  });
  if(changed){checkPhaseCompletion();saveData();}
}

function checkPhaseCompletion(){
  // P1: all 8 images have outcome
  var p1done=true;
  for(var i=0;i<8;i++){if(!data.p1Outcomes[i])p1done=false;}
  if(p1done&&!data.p1StoryUnlocked){data.p1StoryUnlocked=true;}

  // P2: all 8 images have outcome
  var p2done=true;
  for(var i=8;i<16;i++){if(!data.p2Outcomes[i])p2done=false;}
  if(p2done&&!data.p2StoryUnlocked){data.p2StoryUnlocked=true;}
}

function isP2Unlocked(){
  for(var i=0;i<8;i++){if(!data.p1Outcomes[i])return false;}
  return true;
}

function getActiveChallenge(imgIdx){
  for(var i=0;i<data.challenges.length;i++){
    var ch=data.challenges[i];
    if(ch.imageIdx===imgIdx&&ch.status==='active')return ch;
  }
  return null;
}

// RENDER
// ══════════════════════════════════════
function buildMiniPuzzle(wrap, imgIdx, revealed, total, seed){
  wrap.innerHTML='';
  wrap.style.position='relative';
  var img=document.createElement('img');
  img.src=IMG_DATA[imgIdx].src;
  img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block';
  wrap.appendChild(img);
  var cols=Math.ceil(Math.sqrt(total));
  var rows=Math.ceil(total/cols);
  var order=getTileOrder(total,seed);
  var rev={};for(var k=0;k<revealed;k++)rev[order[k]]=true;
  var grid=document.createElement('div');
  grid.style.cssText='position:absolute;inset:0;display:grid;grid-template-columns:repeat('+cols+',1fr);grid-template-rows:repeat('+rows+',1fr)';
  for(var i=0;i<total;i++){
    var tile=document.createElement('div');
    tile.style.cssText=rev[i]?'':'background:rgba(228,224,220,0.95)';
    if(!rev[i]&&i>0&&rev[order[i-1]]){tile.style.boxShadow='inset 1px 0 0 rgba(200,195,190,0.3)';}
    grid.appendChild(tile);
  }
  wrap.appendChild(grid);
}

function render(){
  checkDailyFailures();
  var main=document.getElementById('main');
  main.innerHTML='';

  var active=data.challenges.filter(function(ch2){return ch2.status==='active';});

  // phase pill
  var pill=document.getElementById('phasePill');
  if(isP2Unlocked()){
    pill.textContent='無名之境';
    pill.className='phase-pill';
  } else {
    pill.textContent='光環騎士的旅程';
    pill.className='phase-pill';
  }

  // ── active challenges ──
  if(active.length>0){
    var hd=document.createElement('div');hd.className='sec-hd';
    hd.innerHTML='<div class="sec-title">進行中</div><div class="sec-count">'+active.length+'/5</div>';
    main.appendChild(hd);
    active.forEach(function(ch){renderActiveCard(main,ch);});
  }

  // ── add button ──
  if(active.length<5){
    var addCard=document.createElement('div');addCard.className='add-card';
    addCard.innerHTML='<div class="add-card-label">＋ 新增挑戰</div>';
    addCard.addEventListener('click',openSetup);
    main.appendChild(addCard);
  }

  // ── completed/failed grid ──
  var completedImgs=[];
  for(var i=0;i<16;i++){
    var outcomes=i<8?data.p1Outcomes:data.p2Outcomes;
    if(outcomes[i]){completedImgs.push({imgIdx:i,outcome:outcomes[i]});}
  }
  if(completedImgs.length>0){
    var hd2=document.createElement('div');hd2.className='sec-hd';
    hd2.innerHTML='<div class="sec-title">已完成的挑戰</div>';
    main.appendChild(hd2);
    var grid=document.createElement('div');grid.className='completed-grid';
    completedImgs.forEach(function(item){
      var el=document.createElement('div');
      el.className='cg-item'+(item.outcome==='failed'?' locked':'');
      var img=document.createElement('img');img.src=IMG_DATA[item.imgIdx].src;img.alt='';
      el.appendChild(img);
      if(item.outcome==='failed'){
        var lk=document.createElement('div');lk.className='lock-icon';lk.textContent='🔒';el.appendChild(lk);
      }
      var lbl=document.createElement('div');lbl.className='cg-label';
      lbl.textContent=IMG_DATA[item.imgIdx].label;el.appendChild(lbl);
      // click: re-challenge or view
      (function(idx,oc){el.addEventListener('click',function(){
        if(oc==='done'){openSetup(null,idx);}
        else{openSetup(null,idx);}
      });})(item.imgIdx,item.outcome);
      grid.appendChild(el);
    });
    main.appendChild(grid);
  }

  // story unlock button
  if(data.p1StoryUnlocked&&!data.p1StoryCollected){
    var sb=document.createElement('div');sb.style.cssText='padding:16px 0 0;width:100%';
    var sbtn=document.createElement('button');
    sbtn.style.cssText='width:100%;padding:14px;background:#E8E5FF;color:#4B40B8;border:none;border-radius:14px;font-size:0.9rem;font-weight:600;cursor:pointer';
    sbtn.textContent='✨ 故事揭曉 — 第一階段';
    sbtn.addEventListener('click',function(){openStory(1);});
    sb.appendChild(sbtn);main.appendChild(sb);
  }
  if(data.p2StoryUnlocked&&!data.p2StoryCollected){
    var sb2=document.createElement('div');sb2.style.cssText='padding:8px 0 0;width:100%';
    var sbtn2=document.createElement('button');
    sbtn2.style.cssText='width:100%;padding:14px;background:#E8E5FF;color:#4B40B8;border:none;border-radius:14px;font-size:0.9rem;font-weight:600;cursor:pointer';
    sbtn2.textContent='✨ 故事揭曉 — 第二階段';
    sbtn2.addEventListener('click',function(){openStory(2);});
    sb2.appendChild(sbtn2);main.appendChild(sb2);
  }

  // empty
  if(active.length===0&&completedImgs.length===0){
    var eh=document.createElement('div');eh.className='empty-state';
    eh.innerHTML='<div class="empty-icon">◇</div><div class="empty-txt">新增你的第一個挑戰<br>每一天，解鎖一片謎</div>';
    main.appendChild(eh);
  }
}

function renderActiveCard(parent, ch){
  var pct=Math.min(ch.checkIns.length/ch.totalDays*100,100);
  var checkedToday=false; // TEST MODE
  var imgData=IMG_DATA[ch.imageIdx];

  var card=document.createElement('div');card.className='ch-card';
  var inner=document.createElement('div');inner.className='ch-inner';

  var thumb=document.createElement('div');thumb.className='ch-thumb';
  buildMiniPuzzle(thumb, ch.imageIdx, ch.checkIns.length, ch.totalDays, ch.seed);

  var body=document.createElement('div');body.className='ch-body';
  body.innerHTML='<div class="ch-name">'+ch.name+'</div>'+
    '<div class="ch-sub">'+imgData.label+' · '+ch.checkIns.length+'/'+ch.totalDays+' 天</div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';

  inner.appendChild(thumb);inner.appendChild(body);
  (function(id){inner.addEventListener('click',function(){openPV(id);});})(ch.id);
  card.appendChild(inner);

  var action=document.createElement('div');action.className='ch-action';
  var btn=document.createElement('button');
  if(checkedToday){
    btn.className='checkin-btn done';btn.textContent='✓ 今日已打卡';btn.disabled=true;
  } else {
    btn.className='checkin-btn';btn.textContent='打卡';
    (function(id){btn.addEventListener('click',function(e){e.stopPropagation();doCheckIn(id);});})(ch.id);
  }
  var streak=document.createElement('div');streak.className='streak-txt';
  streak.textContent=ch.checkIns.length>0?'連續 '+ch.checkIns.length+' 天':'';
  action.appendChild(btn);action.appendChild(streak);
  card.appendChild(action);
  parent.appendChild(card);
}

// ══════════════════════════════════════
// CHECK-IN
// ══════════════════════════════════════
function doCheckInSilent(id){
  var ch=findCh(id);if(!ch||ch.status!=='active')return;
  ch.checkIns.push(today());ch.lastCheckIn=today();
  var newCount=ch.checkIns.length;
  if(newCount>=ch.totalDays){
    ch.status='done';
    var outcomes=ch.phase===1?data.p1Outcomes:data.p2Outcomes;
    outcomes[ch.imageIdx]='done';checkPhaseCompletion();
  }
  saveData();openPV(id);
}

function doCheckIn(id){
  var ch=findCh(id);if(!ch||ch.status!=='active')return;
  // TEST MODE: no daily limit
  ch.checkIns.push(today());
  ch.lastCheckIn=today();
  var newCount=ch.checkIns.length;

  if(newCount>=ch.totalDays){
    ch.status='done';
    var outcomes=ch.phase===1?data.p1Outcomes:data.p2Outcomes;
    outcomes[ch.imageIdx]='done';
    checkPhaseCompletion();
  }
  saveData();render();

  // show reveal flash
  showRevealFlash(ch.imageIdx, newCount, ch.totalDays, ch.seed);

  // if open in PV, refresh
  if(document.getElementById('pvOverlay').classList.contains('open')&&pvCurrentId===ch.id){
    if(ch.status==='done'){
      document.getElementById('pvOverlay').classList.remove('open');
    } else {
      openPV(ch.id);
    }
  }
}

function showRevealFlash(imgIdx, pieceNum, totalDays, seed){
  var o=document.getElementById('revealOverlay');
  var wrap=document.getElementById('revealPuzzleWrap');
  buildPuzzle(wrap, imgIdx, pieceNum, totalDays, seed);
  document.getElementById('revealLabel').textContent=IMG_DATA[imgIdx].label;
  document.getElementById('revealDay').textContent=pieceNum;
  o.classList.add('open');
}
document.getElementById('revealCloseBtn').addEventListener('click',function(){
  document.getElementById('revealOverlay').classList.remove('open');
});

// ══════════════════════════════════════
// PUZZLE VIEW
// ══════════════════════════════════════
var pvCurrentId=null;
function findCh(id){for(var i=0;i<data.challenges.length;i++){if(data.challenges[i].id===id)return data.challenges[i];}return null;}

function openPV(id){
  var ch=findCh(id);if(!ch)return;pvCurrentId=id;
  var checkedToday=false; // TEST MODE
  var done=ch.status==='done';
  var pct=Math.min(ch.checkIns.length/ch.totalDays*100,100);

  document.getElementById('pvName').textContent=ch.name;
  document.getElementById('pvDaysBadge').textContent=IMG_DATA[ch.imageIdx].label+' · '+ch.totalDays+'天';
  document.getElementById('pvProgFill').style.width=pct+'%';
  document.getElementById('pvProgLeft').textContent='第 '+ch.checkIns.length+'/'+ch.totalDays+' 天';
  document.getElementById('pvProgPct').textContent=Math.round(pct)+'%';

  var btn=document.getElementById('pvCheckinBtn');
  if(done){btn.className='pv-checkin-btn view-story';btn.textContent='✨ 查看故事';btn.disabled=false;
    btn.onclick=function(){document.getElementById('pvOverlay').classList.remove('open');openStory(ch.phase);};}
  else if(checkedToday){btn.className='pv-checkin-btn done-today';btn.textContent='✓ 今日已打卡';btn.disabled=true;btn.onclick=null;}
  else{btn.className='pv-checkin-btn';btn.textContent='打卡，解鎖下一片';btn.disabled=false;
    btn.onclick=function(){doCheckInSilent(id);};}

  buildPuzzle(document.getElementById('pzWrap'),ch.imageIdx,ch.checkIns.length,ch.totalDays,ch.seed);
  document.getElementById('pvOverlay').classList.add('open');
}

document.getElementById('pvBackBtn').addEventListener('click',function(){
  document.getElementById('pvOverlay').classList.remove('open');pvCurrentId=null;render();
});

function buildPuzzle(wrap,imgIdx,revealed,total,seed){
  wrap.innerHTML='';
  var img=document.createElement('img');img.src=IMG_DATA[imgIdx].src;img.className='pz-full-img';img.alt='';
  wrap.appendChild(img);
  var cols=Math.ceil(Math.sqrt(total));var rows=Math.ceil(total/cols);
  var order=getTileOrder(total,seed);var rev={};
  for(var k=0;k<revealed;k++)rev[order[k]]=true;
  var grid=document.createElement('div');grid.className='pz-grid';
  grid.style.gridTemplateColumns='repeat('+cols+',1fr)';
  grid.style.gridTemplateRows='repeat('+rows+',1fr)';
  for(var i=0;i<total;i++){
    var tile=document.createElement('div');tile.className='pz-tile '+(rev[i]?'revealed':'hidden');
    grid.appendChild(tile);
  }
  wrap.appendChild(grid);
}

// ══════════════════════════════════════
// SETUP SHEET
// ══════════════════════════════════════
var setupPhase=1,setupImgIdx=0,setupDays=6;

function openSetup(e,preselectedIdx){
  setupPhase=1;setupImgIdx=(preselectedIdx!=null?preselectedIdx:0);setupDays=6;
  document.getElementById('challengeName').value='';
  updatePhaseTab();updateImgPicker();updateDayPicker();
  document.getElementById('setupOverlay').classList.add('open');
}
function closeSetup(){document.getElementById('setupOverlay').classList.remove('open');}

document.getElementById('setupBg').addEventListener('click',closeSetup);
document.getElementById('cancelSetupBtn').addEventListener('click',closeSetup);

// phase tabs
document.querySelectorAll('.phase-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    var ph=parseInt(tab.dataset.phase);
    if(ph===2&&!isP2Unlocked()){return;}
    setupPhase=ph;setupImgIdx=ph===1?0:8;
    updatePhaseTab();updateImgPicker();updateDayPicker();
  });
});
function updatePhaseTab(){
  document.querySelectorAll('.phase-tab').forEach(function(t){
    var ph=parseInt(t.dataset.phase);
    t.classList.toggle('active',ph===setupPhase);
    if(ph===2&&!isP2Unlocked())t.classList.add('locked-tab');
    else t.classList.remove('locked-tab');
  });
  document.getElementById('dayPickerWrap').style.display='block';
}

// image picker
function getImgStatus(idx){
  if(idx>=8&&!isP2Unlocked()) return 'locked';
  var outcomes=idx<8?data.p1Outcomes:data.p2Outcomes;
  if(outcomes[idx]==='done') return 'done';
  if(outcomes[idx]==='failed') return 'failed';
  if(getActiveChallenge(idx)) return 'active';
  return 'free';
}
function isPhaseCollected(ph){return ph===1?data.p1StoryCollected:data.p2StoryCollected;}

function updateImgPicker(){
  var picker=document.getElementById('imgPicker');picker.innerHTML='';
  var start=setupPhase===1?0:8;
  for(var i=start;i<start+8;i++){
    var status=getImgStatus(i);
    var canSelect=(status==='free')||(status==='done'&&isPhaseCollected(setupPhase))||(status==='failed'&&isPhaseCollected(setupPhase));
    var item=document.createElement('div');
    item.className='ip-item'+(i===setupImgIdx?' active':'');
    var im=document.createElement('img');im.src=IMG_DATA[i].src;im.alt='';item.appendChild(im);
    var lbl=document.createElement('div');lbl.className='ip-lbl';lbl.textContent=IMG_DATA[i].label;item.appendChild(lbl);
    if(status==='active'){
      var ov=document.createElement('div');
      ov.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.28)';
      var tx=document.createElement('span');tx.style.cssText='font-size:0.55rem;font-weight:600;color:#fff;letter-spacing:0.06em';tx.textContent='進行中';
      ov.appendChild(tx);item.appendChild(ov);
    } else if(status==='done'){
      var ov=document.createElement('div');
      ov.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.18)';
      ov.innerHTML='<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9" stroke="white" stroke-width="1.5" fill="rgba(255,255,255,0.15)"/><polyline points="7,11.5 10,14.5 15,8.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';
      item.appendChild(ov);
    } else if(status==='failed'){
      var ov=document.createElement('div');
      ov.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.32)';
      ov.innerHTML='<svg width="20" height="22" viewBox="0 0 20 22" fill="none"><rect x="3" y="10" width="14" height="11" rx="2" stroke="white" stroke-width="1.5" fill="rgba(255,255,255,0.12)"/><path d="M6.5 10V7a3.5 3.5 0 0 1 7 0v3" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="10" cy="15.5" r="1.5" fill="white"/></svg>';
      item.appendChild(ov);
    } else if(status==='locked'){
      var ov=document.createElement('div');
      ov.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.45)';
      ov.innerHTML='<svg width="20" height="22" viewBox="0 0 20 22" fill="none"><rect x="3" y="10" width="14" height="11" rx="2" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="rgba(255,255,255,0.08)"/><path d="M6.5 10V7a3.5 3.5 0 0 1 7 0v3" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="10" cy="15.5" r="1.5" fill="rgba(255,255,255,0.6)"/></svg>';
      item.appendChild(ov);
    }
    if(!canSelect){item.style.opacity='0.5';item.style.cursor='default';}
    else{(function(idx){item.addEventListener('click',function(){setupImgIdx=idx;updateImgPicker();});})(i);}
    picker.appendChild(item);
  }
}

// day picker
function updateDayPicker(){
  document.querySelectorAll('.day-pill').forEach(function(p){
    p.classList.toggle('active',parseInt(p.dataset.d)===setupDays);
    (function(pill){pill.addEventListener('click',function(){setupDays=parseInt(pill.dataset.d);updateDayPicker();});})(p);
  });
}

document.getElementById('confirmSetupBtn').addEventListener('click',function(){
  var name=document.getElementById('challengeName').value.trim();
  if(!name){document.getElementById('challengeName').focus();return;}
  var activeCount=data.challenges.filter(function(ch2){return ch2.status==='active';}).length;
  if(activeCount>=5){alert('最多同時進行 5 個挑戰');return;}
  if(getActiveChallenge(setupImgIdx)){alert('這張圖片已有進行中的挑戰');return;}
  var seed=Date.now();
  var totalDays=setupDays;
  data.challenges.push({
    id:seed.toString(),name:name,phase:setupPhase,imageIdx:setupImgIdx,
    totalDays:totalDays,checkIns:[],lastCheckIn:null,seed:seed,status:'active',
    startDate:today()
  });
  saveData();closeSetup();render();
});

// ══════════════════════════════════════
// STORY
// ══════════════════════════════════════
var storyPhase=1,storySegs=[],storyIdx=0,storyTimer=null;

function openStory(phase){
  storyPhase=phase;
  var segs=phase===1?P1_STORY:P2_STORY;
  var outcomes=phase===1?data.p1Outcomes:data.p2Outcomes;
  var labels=phase===1?P1_LABELS:P2_LABELS;
  var imgOffset=phase===1?0:8;

  // build segments with filled/blank
  var segEls=document.getElementById('storySegs');segEls.innerHTML='';
  storySegs=[];
  segs.forEach(function(seg){
    var el=document.createElement('div');el.className='story-seg';
    // replace {n} with filled or blank span
    var txt=seg.text.replace(/\{(\d+)\}/g,function(m,idxStr){
      var idx=parseInt(idxStr);
      var outcome=outcomes[idx];
      if(outcome==='done'){
        return '<span class="filled">'+labels[idx-imgOffset]+'</span>';
      } else {
        return '<span class="blank">'+labels[idx-imgOffset]+'</span>';
      }
    });
    el.innerHTML=txt;
    segEls.appendChild(el);
    storySegs.push({el:el,imgIdx:seg.imgIdx});
  });

  // set up background images
  for(var i=0;i<8;i++){
    var imgEl=document.getElementById('storyImg'+i);
    imgEl.src=IMG_DATA[imgOffset+i].src;
    imgEl.className='story-img';
  }

  document.getElementById('storyPhaseLbl').textContent=phase===1?'光環騎士的旅程':'無名之境';
  document.getElementById('storySaveBtn').className='story-save-btn';
  document.getElementById('storyOverlay').classList.add('open');

  storyIdx=0;clearInterval(storyTimer);
  setTimeout(runStoryStep,600);
}

function runStoryStep(){
  if(storyIdx>=storySegs.length){
    // show save btn
    setTimeout(function(){
      document.getElementById('storySaveBtn').classList.add('visible');
    },800);
    return;
  }
  var seg=storySegs[storyIdx];
  seg.el.classList.add('visible');
  // switch bg image
  var imgOffset=storyPhase===1?0:8;
  var relIdx=seg.imgIdx-imgOffset;
  for(var i=0;i<8;i++){document.getElementById('storyImg'+i).classList.remove('active');}
  document.getElementById('storyImg'+relIdx).classList.add('active');
  storyIdx++;
  storyTimer=setTimeout(runStoryStep,2000);
}

document.getElementById('storySaveBtn').addEventListener('click',function(){
  if(storyPhase===1){data.p1StoryCollected=true;}
  else{data.p2StoryCollected=true;}
  saveData();
  document.getElementById('storyOverlay').classList.remove('open');
  render();openBook();
});

// ══════════════════════════════════════
// BOOK
// ══════════════════════════════════════
function openBook(){
  renderBook();
  document.getElementById('bookOverlay').classList.add('open');
}
document.getElementById('bookBtn').addEventListener('click',openBook);
document.getElementById('bookBackBtn').addEventListener('click',function(){
  document.getElementById('bookOverlay').classList.remove('open');
});

function renderBook(){
  var content=document.getElementById('bookContent');content.innerHTML='';
  var hasAny=false;

  [1,2].forEach(function(phase){
    var collected=phase===1?data.p1StoryCollected:data.p2StoryCollected;
    if(!collected)return;
    hasAny=true;
    var outcomes=phase===1?data.p1Outcomes:data.p2Outcomes;
    var labels=phase===1?P1_LABELS:P2_LABELS;
    var imgOffset=phase===1?0:8;

    var box=document.createElement('div');box.className='book-story';
    var hd=document.createElement('div');hd.className='book-story-hd';
    hd.innerHTML='<div class="book-story-title">'+(phase===1?'光環騎士的旅程':'無名之境')+'</div>';
    var replay=document.createElement('button');replay.className='book-replay-btn';replay.textContent='重播故事';
    (function(ph){replay.addEventListener('click',function(){document.getElementById('bookOverlay').classList.remove('open');openStory(ph);});})(phase);
    hd.appendChild(replay);box.appendChild(hd);

    var grid=document.createElement('div');grid.className='book-imgs';
    for(var i=0;i<8;i++){
      var idx=imgOffset+i;
      var outcome=outcomes[idx];
      var item=document.createElement('div');
      item.className='book-img-item'+(outcome==='failed'?' locked':'');
      var im=document.createElement('img');im.src=IMG_DATA[idx].src;im.alt='';item.appendChild(im);
      if(outcome==='failed'){var lk=document.createElement('div');lk.className='lock-icon';lk.textContent='🔒';item.appendChild(lk);}
      var lbl=document.createElement('div');lbl.className='book-img-lbl';lbl.textContent=labels[i];item.appendChild(lbl);
      grid.appendChild(item);
    }
    box.appendChild(grid);content.appendChild(box);
  });

  if(!hasAny){
    content.innerHTML='<div class="book-empty">還沒有收藏的故事<br>完成一個階段的全部挑戰<br>故事就會在這裡等你</div>';
  }
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
render();
</script>
